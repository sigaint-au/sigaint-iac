# Sync waves for operator instance CRs and related bootstrap resources.
# Pair with operator-sync-wave so OLM install (Namespace/OG/Subscription) runs first.
#
#    0   Helper RBAC / NetworkPolicy
#    5   Secrets, Certificates, ExternalSecretsConfig, discovery
#   10   Primary operator CRs (ClusterSecretStore, …)
#   15+  Dependent instance resources (ExternalSecret, …)
#   20   Jobs / QuayRegistry (after deps)
#
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:

  - target:
      kind: Secret
      version: v1
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "5"

  # OpenShift External Secrets Operator config before stores / ExternalSecrets.
  - target:
      kind: ExternalSecretsConfig
      group: operator.openshift.io
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "5"
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-options
        value: SkipDryRunOnMissingResource=true

  - target:
      kind: ClusterSecretStore
      group: external-secrets.io
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "10"
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-options
        value: SkipDryRunOnMissingResource=true

