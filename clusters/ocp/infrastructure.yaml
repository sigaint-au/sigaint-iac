apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ocp-infrastructure
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          # Wave -20: node / cluster base config
          - name: openshift-machine-config-operator
            wave: "-20"
          - name: openshift-network-operator
            wave: "-20"
          - name: cluster-image-registry-operator
            wave: "-15"
          # Wave -10: secrets and certificates
          - name: openshift-cert-manager-operator
            wave: "-10"
          - name: openshift-external-secrets-operator
            wave: "-10"
          # Wave -5: storage
          - name: local-storage
            wave: "-5"
          - name: openshift-data-foundation-operator
            wave: "-5"
          # Wave 0: cluster operators
          - name: nmstate
            wave: "0"
          - name: metallb-operator
            wave: "0"
          - name: openshift-ingress-operator
            wave: "0"
          - name: openshift-apiserver-operator
            wave: "0"
          - name: openshift-console-operator
            wave: "0"
          - name: openshift-pipelines-operator
            wave: "0"
          - name: openshift-logging-operator
            wave: "0"
          - name: loki-operator
            wave: "0"
          - name: cloudnative-pg-operator
            wave: "0"
          - name: quay-operator
            wave: "0"
          - name: grafana-operator
            wave: "0"
          - name: virtualization-operator
            wave: "0"
          - name: openshift-service-mesh
            wave: "0"
          - name: kiali-operator
            wave: "5"
          - name: compliance-operator
            wave: "0"
          - name: container-security-operator
            wave: "0"
          - name: advanced-cluster-security-operator
            wave: "10"
  template:
    metadata:
      name: 'infra-{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/sigaint-au/sigaint-iac
        targetRevision: main
        path: 'infrastructure/{{.name}}/overlays/ocp'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
