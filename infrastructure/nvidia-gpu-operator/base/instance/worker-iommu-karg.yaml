apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 100-worker-iommu-karg
  labels:
    machineconfiguration.openshift.io/role: worker
spec:
  kernelArguments:
    - intel_iommu=on
    - amd_iommu=on
    - iommu=pt
    - rd.driver.blacklist=nouveau,snd_hda_intel
    - modprobe.blacklist=nouveau,snd_hda_intel
