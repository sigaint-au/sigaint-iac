apiVersion: batch/v1
kind: Job
metadata:
  name: create-cluster-init-bundle
  annotations:
    # After Central (10); before SecuredCluster (15)
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: create-cluster-init
      restartPolicy: Never
      containers:
        - name: create-cluster-init-bundle
          # External registry: node DNS (e.g. 10.120.14.13) cannot resolve
          # image-registry.openshift-image-registry.svc for kubelet pulls.
          image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.22
          imagePullPolicy: IfNotPresent
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-htpasswd
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              if kubectl get secret/sensor-tls &>/dev/null; then
                echo "cluster-init bundle already configured"
                exit 0
              fi

              attempt_counter=0
              max_attempts=30
              echo "Waiting for central..."
              until curl --output /dev/null --silent --head --fail --cacert /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt \
                  https://central.stackrox.svc || \
                  curl -k --output /dev/null --silent --head --fail https://central; do
                attempt_counter=$((attempt_counter + 1))
                if [ "${attempt_counter}" -ge "${max_attempts}" ]; then
                  echo "Max attempts reached waiting for central"
                  exit 1
                fi
                sleep 5
              done

              echo "Creating cluster-init bundle"
              DATA='{"name":"local-cluster"}'
              curl -k -o /tmp/bundle.json -X POST \
                -u "admin:${PASSWORD}" \
                -H "Content-Type: application/json" \
                --data "${DATA}" \
                https://central/v1/cluster-init/init-bundles

              # kubectlBundle is standard base64 (no python required in ose-cli)
              kubectl_bundle="$(sed -n 's/.*"kubectlBundle"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/bundle.json | head -1)"
              if [[ -z "${kubectl_bundle}" ]]; then
                echo "failed to parse kubectlBundle from init-bundle response"
                cat /tmp/bundle.json
                exit 1
              fi
              printf '%s' "${kubectl_bundle}" | base64 -d | oc apply -f -

              oc label SecuredCluster local-cluster cluster-init-job-status=created --overwrite
              echo "ACS cluster init bundle applied"
