apiVersion: batch/v1
kind: Job
metadata:
  name: create-cluster-init-bundle
  annotations:
    # After Central (10); before SecuredCluster (15)
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: create-cluster-init
      restartPolicy: Never
      containers:
        - name: create-cluster-init-bundle
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-htpasswd
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              if kubectl get secret/sensor-tls &>/dev/null; then
                echo "cluster-init bundle already configured"
                exit 0
              fi

              attempt_counter=0
              max_attempts=30
              echo "Waiting for central..."
              until curl --output /dev/null --silent --head --fail --cacert /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt \
                  https://central.stackrox.svc || \
                  curl -k --output /dev/null --silent --head --fail https://central; do
                attempt_counter=$((attempt_counter + 1))
                if [ "${attempt_counter}" -ge "${max_attempts}" ]; then
                  echo "Max attempts reached waiting for central"
                  exit 1
                fi
                sleep 5
              done

              echo "Creating cluster-init bundle"
              DATA='{"name":"local-cluster"}'
              curl -k -o /tmp/bundle.json -X POST \
                -u "admin:${PASSWORD}" \
                -H "Content-Type: application/json" \
                --data "${DATA}" \
                https://central/v1/cluster-init/init-bundles

              python3 -c "import sys, json; print(json.load(sys.stdin)['kubectlBundle'])" \
                </tmp/bundle.json | base64 -d | oc apply -f -

              oc label SecuredCluster local-cluster cluster-init-job-status=created --overwrite
              echo "ACS cluster init bundle applied"
