apiVersion: platform.stackrox.io/v1alpha1
kind: SecuredCluster
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: local-cluster
spec:
  clusterName: local-cluster
  admissionControl:
    listenOnCreates: true
    listenOnEvents: true
    listenOnUpdates: true
  perNode:
    collector:
      # CORE_BPF is the supported collector method on current RHACS releases.
      collection: CORE_BPF
      imageFlavor: Regular
    taintToleration: TolerateTaints
