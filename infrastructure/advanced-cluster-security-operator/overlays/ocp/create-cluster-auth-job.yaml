apiVersion: batch/v1
kind: Job
metadata:
  name: create-oauth-auth-provider
  namespace: stackrox
  annotations:
    # After SecuredCluster / OAuth dependencies
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: create-cluster-init
      restartPolicy: Never
      containers:
        - name: create-oauth-auth-provider
          # External registry: node DNS cannot resolve the in-cluster registry hostname.
          image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.22
          imagePullPolicy: IfNotPresent
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-htpasswd
                  key: password
            # Least privilege default; elevate specific groups in ACS UI/API as needed.
            - name: DEFAULT_ROLE
              value: Analyst
            - name: UI_ENDPOINT
              value: rhacs-central.apps.ocp.sigaint.au
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              attempt_counter=0
              max_attempts=30
              echo "Waiting for central..."
              until curl -k --output /dev/null --silent --head --fail https://central; do
                attempt_counter=$((attempt_counter + 1))
                if [ "${attempt_counter}" -ge "${max_attempts}" ]; then
                  echo "Max attempts reached waiting for central"
                  exit 1
                fi
                sleep 5
              done

              response="$(curl -k -u "admin:${PASSWORD}" \
                "https://central/v1/authProviders?name=OpenShift")"
              if echo "${response}" | grep -q '"name"[[:space:]]*:[[:space:]]*"OpenShift"'; then
                echo "OpenShift auth provider already exists"
                exit 0
              fi

              DATA="{\"name\":\"OpenShift\",\"type\":\"openshift\",\"active\":true,\"uiEndpoint\":\"${UI_ENDPOINT}\",\"enabled\":true}"
              auth_resp="$(curl -k -X POST -u "admin:${PASSWORD}" \
                -H "Content-Type: application/json" \
                --data "${DATA}" \
                https://central/v1/authProviders)"
              authid="$(echo "${auth_resp}" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)"
              if [[ -z "${authid}" ]]; then
                echo "failed to create auth provider"
                echo "${auth_resp}"
                exit 1
              fi

              echo "Auth provider id=${authid}; setting minimum role to ${DEFAULT_ROLE}"
              DATA="{\"previous_groups\":[],\"required_groups\":[{\"props\":{\"authProviderId\":\"${authid}\"},\"roleName\":\"${DEFAULT_ROLE}\"}]}"
              curl -k -X POST -u "admin:${PASSWORD}" \
                -H "Content-Type: application/json" \
                --data "${DATA}" \
                https://central/v1/groupsbatch
