---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    istio-discovery: enabled
  annotations:
    openshift.io/display-name: Istio CNI
  name: istio-cni
---
# sailoperator.io/v1 IstioCNI — profile is under values, not spec.profile
apiVersion: sailoperator.io/v1
kind: IstioCNI
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespace: istio-cni
  values:
    profile: ambient
