# Managed via Server-Side Apply. Unmanaged fields stay owned by the CNO.
#
# Cluster network MTU 8900 for 9k jumbo (machine MTU 9000 minus 100-byte
# OVN-Kubernetes overlay overhead). See README.md.
apiVersion: operator.openshift.io/v1
kind: Network
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true,RespectIgnoreDifferences=true
spec:
  defaultNetwork:
    ovnKubernetesConfig:
      mtu: 8900
      gatewayConfig:
        # Required for Istio ambient mode and multi-homed / MetalLB forwarding.
        routingViaHost: true
        ipForwarding: Global
