apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../components/operator-sync-wave
  - ../../../../components/operator-instance-sync-wave
resources:
    - ../../base
patches:
# This patch is needed for the operator
# to watch all namespaces.
- target:
    kind: OperatorGroup
    name: quay-operator-group
  patch: |-
    - op: remove
      path: /spec/targetNamespaces

# Install into openshift-operators instead of
# quay-operator. Pin Quay Operator to latest GA channel.
- target:
    kind: Subscription
    name: quay-operator
  patch: |-
    - op: replace
      path: /metadata/namespace
      value: openshift-operators
    - op: replace
      path: /spec/channel
      value: stable-3.16
