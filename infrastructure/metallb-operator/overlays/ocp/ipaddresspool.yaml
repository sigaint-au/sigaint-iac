---
# VIP ranges for LHM production VLANs (IPv4 .200–.250; IPv6 ::c8–::fa within each /64).
# Pool names match NetworkAttachmentDefinitions (localnet / NAD name).
# Services must set metallb.io/ip-allocated-from-pool (autoAssign is false).
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: mgmt-lhm-prod
  namespace: metallb-system
spec:
  addresses:
    - 10.120.10.200-10.120.10.250
    - 2404:e80:4b6f:10::c8-2404:e80:4b6f:10::fa
  autoAssign: false
  avoidBuggyIPs: false
---
