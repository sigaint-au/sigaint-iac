apiVersion: ocs.openshift.io/v1
kind: StorageCluster
metadata:
  name: ocs-storagecluster
  namespace: openshift-storage
  annotations:
    cluster.ocs.openshift.io/local-devices: "true"
    uninstall.ocs.openshift.io/cleanup-policy: delete
    uninstall.ocs.openshift.io/mode: graceful
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  flexibleScaling: true
  monDataDirHostPath: /var/lib/rook
  resourceProfile: lean
  managedResources:
    cephBlockPools:
      defaultStorageClass: true
    # Propagated by ocs-operator to CephCluster ocs-storagecluster-cephcluster.
    # Wipes OSD disks that still hold metadata from a previous Ceph install so
    # new OSDs can prepare them (equivalent to:
    #   oc patch cephcluster ... /spec/cleanupPolicy/wipeDevicesFromOtherClusters).
    cephCluster:
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
  storageDeviceSets:
    - name: ocs-deviceset-local-block
      count: 15
      replica: 1
      portable: false
      dataPVCTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "1"
          storageClassName: local-block
          volumeMode: Block
