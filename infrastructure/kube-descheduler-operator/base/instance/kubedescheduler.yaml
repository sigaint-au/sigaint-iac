# Cluster descheduler for OpenShift Virtualization.
# Profile DevKubeVirtRelieveAndMigrate requires worker kernel arg psi=1
# (see worker-psi-karg.yaml). Do not combine with LifecycleAndUtilization.
apiVersion: operator.openshift.io/v1
kind: KubeDescheduler
metadata:
  name: cluster
  namespace: openshift-kube-descheduler-operator
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  managementState: Managed
  mode: Automatic
  deschedulingIntervalSeconds: 3600
  logLevel: Normal
  operatorLogLevel: Normal
  profiles:
    # Soft topology / preferred anti-affinity (VM spread).
    - SoftTopologyAndDuplicates
    # Virt-aware rebalance / migrate from high-cost nodes (Tech Preview).
    - DevKubeVirtRelieveAndMigrate
  profileCustomizations:
    devEnableSoftTainter: true
    devDeviationThresholds: AsymmetricLow
    devActualUtilizationProfile: PrometheusCPUCombined
