# Cluster descheduler for OpenShift Virtualization density / soft topology.
# CRD ships with cluster-kube-descheduler-operator CSV.
apiVersion: operator.openshift.io/v1
kind: KubeDescheduler
metadata:
  name: cluster
  namespace: openshift-kube-descheduler-operator
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  managementState: Managed
  # Automatic = evict; Predictive = log-only dry-run.
  mode: Automatic
  deschedulingIntervalSeconds: 3600
  logLevel: Normal
  operatorLogLevel: Normal
  profiles:
    # Soft topology / preferred anti-affinity violations (VM spread).
    - SoftTopologyAndDuplicates
    # Rebalance under/over-utilized nodes.
    - LifecycleAndUtilization
