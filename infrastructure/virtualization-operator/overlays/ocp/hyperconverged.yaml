apiVersion: hco.kubevirt.io/v1beta1
kind: HyperConverged
metadata:
  name: kubevirt-hyperconverged
  annotations:
    deployOVS: 'false'
  namespace: openshift-cnv
spec:
  enableCommonBootImageImport: true
  virtualMachineOptions:
    disableFreePageReporting: false
    disableSerialConsoleLog: false
  higherWorkloadDensity:
    memoryOvercommitPercentage: 150
  liveMigrationConfig:
    allowAutoConverge: false
    allowPostCopy: false
    completionTimeoutPerGiB: 800
    parallelMigrationsPerCluster: 1
    parallelOutboundMigrationsPerNode: 1
    progressTimeout: 150
  certConfig:
    ca:
      duration: 48h0m0s
      renewBefore: 24h0m0s
    server:
      duration: 24h0m0s
      renewBefore: 12h0m0s
  enableApplicationAwareQuota: false
  infra: {}
  applicationAwareConfig:
    allowApplicationAwareClusterResourceQuota: false
    vmiCalcConfigName: DedicatedVirtualResources
  ksmConfiguration:
    nodeLabelSelector: {}
  evictionStrategy: LiveMigrateIfPossible
  featureGates:
    deployTektonTaskResources: false
    enableMultiArchBootImageImport: false
    withHostPassthroughCPU: false
    downwardMetrics: false
    # Full GPU PCIe passthrough (not mediated vGPU/MDEV).
    disableMDevConfiguration: true
    declarativeHotplugVolumes: false
    deployKubeSecondaryDNS: false
    nonRoot: true
    alignCPUs: false
    enableManagedTenantQuota: false
    persistentReservation: false
    autoResourceLimits: true
    decentralizedLiveMigration: false
  # NVIDIA GP107GL — live PCI ID 10DE:1CB3 (Quadro P400 family; not 1BB4/P620).
  # externalResourceProvider: sandbox-device-plugin from nvidia-gpu-operator
  permittedHostDevices:
    pciHostDevices:
      - pciDeviceSelector: "10DE:1CB3"
        resourceName: nvidia.com/GP107GL_QUADRO_P400
        externalResourceProvider: true
  # CNV operator/workload updates via live migration.
  # Node pressure / relieve-and-migrate is handled by KubeDescheduler
  # (DevKubeVirtRelieveAndMigrate profile).
  workloadUpdateStrategy:
    batchEvictionInterval: 1m0s
    batchEvictionSize: 10
    workloadUpdateMethods:
      - LiveMigrate
  deployVmConsoleProxy: false
  uninstallStrategy: BlockUninstallIfWorkloadsExist
  workloads: {}
  resourceRequirements:
    vmiCPUAllocationRatio: 10